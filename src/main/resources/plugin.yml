name: FirstPlugin
version: '${project.version}'
main: com.andezion.firstplugin.FirstPlugin
api-version: '1.20'
description: A PaperMC plugin that greets players on join and quit
author: Andezion

commands:
  protect:
    description: Manage block protection
    usage: /protect [toggle|here|remove]
    permission: firstplugin.admin
  kill:
    description: Kill a player by name or UUID
    usage: /kill <name|uuid>
    permission: firstplugin.admin

permissions:

  firstplugin.admin:
    description: Grants the Admin rank (red nametag, all plugin features)
    default: op

  firstplugin.premium:
    description: Grants the Premium rank (gold nametag, premium features)
    default: false

  firstplugin.player:
    description: Default player rank (white nametag)
    default: true
